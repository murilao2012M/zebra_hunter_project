version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - zebra_data:/app/data
      - zebra_reports:/app/reports
      - zebra_backups:/app/backups
      - zebra_static:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/accounts/login/', timeout=5)\""]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    restart: unless-stopped
    depends_on:
      - redis
      - web
    command: ["python", "-m", "celery", "-A", "webapp", "worker", "-l", "info", "--pool=solo"]
    volumes:
      - zebra_data:/app/data
      - zebra_reports:/app/reports
      - zebra_backups:/app/backups

  beat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    restart: unless-stopped
    depends_on:
      - redis
      - web
    command: ["python", "-m", "celery", "-A", "webapp", "beat", "-l", "info"]
    volumes:
      - zebra_data:/app/data
      - zebra_reports:/app/reports
      - zebra_backups:/app/backups

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - zebra_static:/app/staticfiles:ro

volumes:
  redis_data:
  zebra_data:
  zebra_reports:
  zebra_backups:
  zebra_static:

